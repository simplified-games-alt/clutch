<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8">
    <title>Pit Scouting Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/pit.css">

    <link rel="icon" href="icons/Nitro-Icon.png" />

</head>

<body>
    <button onclick="window.location.href='index.html'">Home</button>
    <label><br></label>
    <button onclick="window.location.href='MatchScouting.html'">Go to Match Scouting</button>
    <label><br></label>
    <div class="container">
        <h1>Pit Scouting Submission</h1>
        <form action="index.html" method="POST" id="pitData" enctype="multipart/form-data">

            <div class="section">
                <h2>Prerequisites</h2>
                <div class="option-group">
                    <div class="form-group">
                        <label for="scouter_initials">Scouter Initials:</label>
                        <input type="text" id="scouter_initials" name="scouter_initials" required>
                    </div>
                    <div class="team-dropdown">
                        <label for="team_number">Team Number:</label>
                        <input type="number" id="team_number" name="team_number" min="1" required>
                    </div>
                </div>
        
            </div>

            <div class="section">
                <h2>General Capabilities</h2>
                <div class="option-group">

                    <div class="form-group">
                        <label for="drivebase">What drivebase does your robot have?</label>
                        <select id="drivebase" name="drivebase" required>
                            <option value="" disabled selected></option>
                            <option value="Swerve">Swerve Drive</option>
                            <option value="Tank">Tank Drive</option>
                            <option value="Other_drivebase">Other</option>
                        </select>
                    </div>               
                
                </div>

                <div class="option-group">

                    <div class="form-group">
                    <label for="fuel_capabilities">Can your robot score fuel?</label>
                    <select id="fuel_capabilities" name="fuel_capabilities" required>
                        <option value="" disabled selected></option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                </div>

                <div class="option-group">

                    <label for="fuel_storage">How much fuel can your robot store?</label>
                    <div class="radio-options">
                        <label><input type="radio" id="0" name="fuel_cap" value="0" required>0</label>
                        <label><input type="radio" id="1-10" name="fuel_cap" value="1-10" required>1-10</label>
                        <label><input type="radio" id="11-20" name="fuel_cap" value="11-20" required>11-20</label>
                        <label><input type="radio" id="21-30" name="fuel_cap" value="21-30" required>21-30</label>
                        <label><input type="radio" id="31-40" name="fuel_cap" value="31-40" required>31-40</label>
                        <label><input type="radio" id="40+" name="fuel_cap" value="40+" required>40+</label>
                    </div>

                </div> 
                
            </div>

            <div class="section">
                <h2>Auto Capabilities</h2>


                <div class="option-group">
                    <div class="form-group">
                    <label for="auto">Does your robot have an auto?</label>
                    <select id="auto" name="auto" required>
                        <option value="" disabled selected></option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                    </div>
                </div>


                <div class="option-group">
                 <div class="form-group; checkbox-row">
                    <label for="auto_capabilities">If so, what does your robot do in auto?</label>
                    <label><input type="checkbox" id="auto_fuel" name="auto_fuel" value="auto_fuel">Shoot fuel</label>
                    <label><input type="checkbox" id="auto_collectfuel" name="auto_collectfuel" value="auto_collectfuel">Intake fuel</label>
                    <label><input type="checkbox" id="auto_inbound" name="auto_inbound" value="auto_inbound">Inbound fuel</label>
                    <label><input type="checkbox" id="auto_climb" name="auto_climb" value="auto_climb">Climb</label>
                    <label>Any specifics can be mentioned in extra comments at the bottom.</label>
                </div>
                </div>





            </div>



        
            <!-- Endgame Section -->
            <div class="section">
                <h2>Endgame Capabilities</h2>

                <div class="option-group">

                    <div class="form-group; checkbox-row">
                    <label for="endgame_climb">What levels can their robot climb?</label>
                        <label><input type="checkbox" id="climb _capabilities" name="climb_capabilities" value="climb_capabilities">Cannot Climb</label>
                        <label><input type="checkbox" id="climb _capabilities" name="climb_capabilities" value="climb_capabilities">L1</label>
                        <label><input type="checkbox" id="climb _capabilities" name="climb_capabilities" value="climb_capabilities">L2</label>
                        <label><input type="checkbox" id="climb _capabilities" name="climb_capabilities" value="climb_capabilities">L3</label>
                
                </div>

                </div>

                
            </div>


            <div class="section">
                <h2>General Strategy</h2>
                <div class="option-group">
                    <div class="form-group">
                        <label for="defense">Is their robot focused on defense?</label>
                        <select id="defense" name="defense" required>
                            <option value="" disabled selected></option>
                            <option value="Yes">Yes</option>
                            <option value="no">No</option>
                        </select>
                </div>
                </div>
                <div class="option-group">
                    <label>What do they aim to do during active alliance shifts?</label>
                    <div class="radio-options">
                        <label><input type="radio" name="active_strat" value="none" required> Unknown</label>
                        <label><input type="radio" name="active_strat" value="shoot" required> Shoots</label>
                        <label><input type="radio" name="active_strat" value="inbound" required> Inbounds</label>
                        <label><input type="radio" name="active_strat" value="defend" required> Defends</label>
                    </div>
                </div>

                <div class="option-group">
                    <label>What do they aim to do during deactive alliance shifts?</label>
                    <div class="radio-options">
                        <label><input type="radio" name="inactive_strat" value="none" required> Unknown</label>
                        <label><input type="radio" name="inactive_strat" value="shoot" required> Shoots</label>
                        <label><input type="radio" name="inactive_strat" value="inbound" required> Inbounds</label>
                        <label><input type="radio" name="inactive_strat" value="defend" required> Defends</label>
                    </div>
                </div>

            </div>


            <!-- Misc Section -->
            <div class="section">
                <h2>Miscellaneous</h2>

                <div class="option-group">
                <div class="form-group; checkbox-row">
                    <label for="bump/trench">Does your robot go over the bumps or through the trenches?</label>
                    <label><input type="checkbox" id="bump" name="bump" value="bump">Bump</label>
                    <label><input type="checkbox" id="trench" name="trench" value="trench">Trench</label>
                    <label></label>
                </div>
                </div>

                <div class="extra-notes">
                    <label>Any USEFUL extra notes?<br></label>
                    <label><br></label>
                    <input type="text" id="extra_notes" name="extra_notes" placeholder="eg. Their auto routine shoots all the fuel from the outpost into the hub in 5-10 seconds.">
                </div>

                <button type="submit">Submit Pit Data</button>
            </div>
        </form>

        <script>
            document.getElementById("pitData").addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const obj = Object.fromEntries(formData.entries());

            const emojis = ['1', '2', '3', '4', '5', '6', '7', '8','9', '0'];
            const uid = Array.from(crypto.getRandomValues(new Uint8Array(5)))
                .map(b => emojis[b % emojis.length])
                .join('');
            obj.UID = uid;

            localStorage.setItem('qrData', JSON.stringify(obj));
            console.log("Storing data", obj);
            window.location.href = "index.html";
        });

        </script>
    </div>
</body>
</html>
